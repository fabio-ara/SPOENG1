<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sprint Master</title>
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <main class="app">
    <header class="masthead">
      <div class="masthead__top">
        <img class="masthead__logo" src="./assets/ifsp-logo.png" alt="Logotipo do IFSP">
        <div class="masthead__title-group">
          <p class="masthead__eyebrow">IFSP · SPOENG1</p>
          <h1>Sprint Master</h1>
        </div>
      </div>
      <p class="masthead__meta">Cadastro simples de projetos de pesquisa.</p>
    </header>

    <section class="strip" aria-labelledby="dashboard-title">
      <h2 id="dashboard-title" class="sr-only">Resumo</h2>
      <ul class="stats" aria-label="Resumo dos projetos">
        <li class="stat">
          <span class="stat__icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" focusable="false">
              <path d="M4 5.5A1.5 1.5 0 0 1 5.5 4h6.879a2 2 0 0 1 1.414.586l4.621 4.621A2 2 0 0 1 19 10.621V18.5A1.5 1.5 0 0 1 17.5 20h-12A1.5 1.5 0 0 1 4 18.5z"/>
              <path d="M13 4.5V9a1 1 0 0 0 1 1h4.5"/>
            </svg>
          </span>
          <strong id="total-projects">0</strong>
        </li>
        <li class="stat">
          <span class="stat__icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" focusable="false">
              <rect x="4" y="5" width="16" height="15" rx="2"/>
              <path d="M8 3v4M16 3v4M4 10h16"/>
            </svg>
          </span>
          <strong id="projects-with-deadline">0</strong>
        </li>
        <li class="stat stat--wide">
          <span class="stat__icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" focusable="false">
              <circle cx="12" cy="12" r="8"/>
              <path d="M12 7v5l3 2"/>
            </svg>
          </span>
          <strong id="next-deadline">Nenhum</strong>
        </li>
      </ul>
    </section>

    <section class="panel panel--form" aria-labelledby="project-form-title">
      <div class="section-head">
        <h2 id="project-form-title">Novo projeto</h2>
        <span class="section-head__icon" aria-hidden="true">
          <svg viewBox="0 0 24 24" focusable="false">
            <path d="M12 5v14M5 12h14"/>
          </svg>
        </span>
      </div>

      <form id="project-form" class="project-form">
        <label class="field">
          <span class="field__label">Nome</span>
          <input type="text" name="name" maxlength="80" placeholder="Plataforma de Iniciacao Cientifica" required>
        </label>

        <label class="field">
          <span class="field__label">Descricao</span>
          <textarea name="description" rows="3" maxlength="240" placeholder="Objetivo, contexto ou recorte do projeto."></textarea>
        </label>

        <label class="field">
          <span class="field__label">Prazo</span>
          <input type="date" name="deadline">
        </label>

        <button type="submit" class="button">Salvar</button>
        <p id="form-feedback" class="form-feedback" aria-live="polite"></p>
      </form>
    </section>

    <section class="panel" aria-labelledby="projects-title">
      <div class="section-head">
        <h2 id="projects-title">Projetos</h2>
        <span class="section-head__icon" aria-hidden="true">
          <svg viewBox="0 0 24 24" focusable="false">
            <path d="M6 7h12M6 12h12M6 17h12"/>
          </svg>
        </span>
      </div>

      <div id="projects-empty-state" class="empty-state">
        <span class="empty-state__icon" aria-hidden="true">
          <svg viewBox="0 0 24 24" focusable="false">
            <path d="M4 5.5A1.5 1.5 0 0 1 5.5 4h6.879a2 2 0 0 1 1.414.586l4.621 4.621A2 2 0 0 1 19 10.621V18.5A1.5 1.5 0 0 1 17.5 20h-12A1.5 1.5 0 0 1 4 18.5z"/>
            <path d="M13 4.5V9a1 1 0 0 0 1 1h4.5"/>
          </svg>
        </span>
        <p>Nenhum projeto cadastrado.</p>
      </div>

      <div id="projects-list" class="projects-list" aria-live="polite"></div>
    </section>
  </main>

  <script src="./script.js"></script>
</body>
</html>
