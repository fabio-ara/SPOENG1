<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sprint Master</title>
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <main class="app">
    <header class="masthead">
      <div class="masthead__top">
        <div class="masthead__brand">
          <img class="masthead__logo" src="./assets/ifsp-logo.png" alt="Logotipo do IFSP">
          <div class="masthead__copy">
            <h1>Sprint Master</h1>
            <p class="masthead__subtitle">Sistema de Gestão de Projetos de Pesquisa</p>
          </div>
        </div>
        <div class="masthead__actions">
          <button type="button" id="open-json-overlay" class="icon-button icon-button--toolbar" aria-label="Abrir JSON" title="JSON">
            <svg viewBox="0 0 24 24" focusable="false" aria-hidden="true">
              <path d="M9 5c-2 0-3 1-3 3v2c0 1-.4 1.7-1.2 2 .8.3 1.2 1 1.2 2v2c0 2 1 3 3 3"/>
              <path d="M15 5c2 0 3 1 3 3v2c0 1 .4 1.7 1.2 2-.8.3-1.2 1-1.2 2v2c0 2-1 3-3 3"/>
            </svg>
          </button>
          <button type="button" id="open-members-overlay" class="icon-button icon-button--toolbar" aria-label="Abrir responsáveis" title="Responsáveis">
            <svg viewBox="0 0 24 24" focusable="false" aria-hidden="true">
              <circle cx="12" cy="8" r="3.5"/>
              <path d="M5 19a7 7 0 0 1 14 0"/>
            </svg>
          </button>
          <button type="button" id="open-project-overlay" class="icon-button icon-button--toolbar" aria-label="Novo projeto" title="Novo projeto">
            <svg viewBox="0 0 24 24" focusable="false" aria-hidden="true">
              <path d="M12 5v14M5 12h14"/>
            </svg>
          </button>
        </div>
      </div>
    </header>

    <section class="strip" aria-labelledby="dashboard-title">
      <h2 id="dashboard-title" class="sr-only">Resumo</h2>
      <ul class="stats" aria-label="Resumo dos projetos">
        <li class="stat">
          <span class="stat__icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" focusable="false">
              <path d="M4 5.5A1.5 1.5 0 0 1 5.5 4h6.879a2 2 0 0 1 1.414.586l4.621 4.621A2 2 0 0 1 19 10.621V18.5A1.5 1.5 0 0 1 17.5 20h-12A1.5 1.5 0 0 1 4 18.5z"/>
              <path d="M13 4.5V9a1 1 0 0 0 1 1h4.5"/>
            </svg>
          </span>
          <strong id="total-projects">0</strong>
        </li>
        <li class="stat">
          <span class="stat__icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" focusable="false">
              <path d="M5 6.5A1.5 1.5 0 0 1 6.5 5h11A1.5 1.5 0 0 1 19 6.5v11a1.5 1.5 0 0 1-1.5 1.5h-11A1.5 1.5 0 0 1 5 17.5z"/>
              <path d="M8 9h8M8 12h8M8 15h5"/>
            </svg>
          </span>
          <strong id="total-activities">0</strong>
        </li>
        <li class="stat">
          <span class="stat__icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" focusable="false">
              <rect x="4" y="5" width="16" height="15" rx="2"/>
              <path d="M8 3v4M16 3v4M4 10h16"/>
            </svg>
          </span>
          <strong id="completed-activities">0</strong>
        </li>
        <li class="stat stat--wide">
          <span class="stat__icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" focusable="false">
              <path d="M12 4a8 8 0 1 1-8 8"/>
              <path d="M12 4v8h8"/>
            </svg>
          </span>
          <strong id="overall-progress">0%</strong>
        </li>
      </ul>
    </section>

    <section class="panel" aria-labelledby="projects-title">
      <div class="section-head">
        <h2 id="projects-title">Projetos</h2>
        <span class="section-head__icon" aria-hidden="true">
          <svg viewBox="0 0 24 24" focusable="false">
            <path d="M6 7h12M6 12h12M6 17h12"/>
          </svg>
        </span>
      </div>

      <div id="projects-empty-state" class="empty-state">
        <span class="empty-state__icon" aria-hidden="true">
          <svg viewBox="0 0 24 24" focusable="false">
            <path d="M4 5.5A1.5 1.5 0 0 1 5.5 4h6.879a2 2 0 0 1 1.414.586l4.621 4.621A2 2 0 0 1 19 10.621V18.5A1.5 1.5 0 0 1 17.5 20h-12A1.5 1.5 0 0 1 4 18.5z"/>
            <path d="M13 4.5V9a1 1 0 0 0 1 1h4.5"/>
          </svg>
        </span>
        <p>Nenhum projeto cadastrado.</p>
      </div>

      <div id="projects-list" class="projects-list" aria-live="polite"></div>
    </section>
  </main>

  <section id="members-overlay" class="overlay-shell" hidden aria-hidden="true">
    <article class="overlay-panel" role="dialog" aria-modal="true" aria-labelledby="members-title">
      <div class="section-head section-head--overlay">
        <h2 id="members-title">Responsáveis</h2>
        <button type="button" class="icon-button overlay-close-button" data-close-overlay="members" aria-label="Fechar responsáveis" title="Fechar">
          <svg viewBox="0 0 24 24" focusable="false" aria-hidden="true">
            <path d="M6 6l12 12M18 6L6 18"/>
          </svg>
        </button>
      </div>

      <form id="member-form" class="member-form">
        <label class="field field--icon">
          <span class="field__label sr-only">Nome do responsável</span>
          <span class="field__icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" focusable="false">
              <circle cx="12" cy="8" r="3.5"/>
              <path d="M5 19a7 7 0 0 1 14 0"/>
            </svg>
          </span>
          <input type="text" name="memberName" maxlength="60" placeholder="Novo responsável" aria-label="Nome do responsável" required>
        </label>

        <button type="submit" class="button button--secondary button--icon button--icon-right" aria-label="Adicionar responsável" title="Adicionar responsável">
          <svg viewBox="0 0 24 24" focusable="false" aria-hidden="true">
            <path d="M12 5v14M5 12h14"/>
          </svg>
        </button>
      </form>
      <p id="member-feedback" class="form-feedback" aria-live="polite"></p>

      <div id="members-empty-state" class="empty-state" hidden>
        <span class="empty-state__icon" aria-hidden="true">
          <svg viewBox="0 0 24 24" focusable="false">
            <circle cx="12" cy="8" r="3.5"/>
            <path d="M5 19a7 7 0 0 1 14 0"/>
          </svg>
        </span>
        <p>Nenhum responsável cadastrado.</p>
      </div>

      <ul id="members-list" class="member-list" aria-live="polite"></ul>
    </article>
  </section>

  <section id="project-overlay" class="overlay-shell" hidden aria-hidden="true">
    <article class="overlay-panel overlay-panel--editing" role="dialog" aria-modal="true" aria-labelledby="project-form-title">
      <div class="section-head section-head--overlay">
        <h2 id="project-form-title">Novo projeto</h2>
        <button type="button" class="icon-button overlay-close-button" data-close-overlay="project" aria-label="Fechar projeto" title="Fechar">
          <svg viewBox="0 0 24 24" focusable="false" aria-hidden="true">
            <path d="M6 6l12 12M18 6L6 18"/>
          </svg>
        </button>
      </div>

      <form id="project-form" class="project-form">
        <input type="hidden" name="projectId">
        <label class="field field--icon">
          <span class="field__label sr-only">Nome do projeto</span>
          <span class="field__icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" focusable="false">
              <path d="M4 5.5A1.5 1.5 0 0 1 5.5 4h6.879a2 2 0 0 1 1.414.586l4.621 4.621A2 2 0 0 1 19 10.621V18.5A1.5 1.5 0 0 1 17.5 20h-12A1.5 1.5 0 0 1 4 18.5z"/>
              <path d="M13 4.5V9a1 1 0 0 0 1 1h4.5"/>
            </svg>
          </span>
          <input type="text" name="name" maxlength="80" placeholder="Plataforma de Iniciação Científica" aria-label="Nome do projeto" required>
        </label>

        <label class="field field--icon">
          <span class="field__label sr-only">Descrição do projeto</span>
          <span class="field__icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" focusable="false">
              <path d="M6 7h12M6 12h12M6 17h8"/>
            </svg>
          </span>
          <textarea name="description" rows="3" maxlength="240" placeholder="Descrição do projeto." aria-label="Descrição do projeto"></textarea>
        </label>

        <label class="field field--icon">
          <span class="field__label sr-only">Prazo do projeto</span>
          <span class="field__icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" focusable="false">
              <rect x="4" y="5" width="16" height="15" rx="2"/>
              <path d="M8 3v4M16 3v4M4 10h16"/>
            </svg>
          </span>
          <input type="date" name="deadline" aria-label="Prazo do projeto">
        </label>

        <div class="project-form__actions">
          <button type="submit" class="button button--icon button--icon-right" aria-label="Salvar projeto" title="Salvar projeto">
            <svg viewBox="0 0 24 24" focusable="false" aria-hidden="true">
              <path d="M12 5v14M5 12h14"/>
            </svg>
          </button>
          <button type="button" id="project-form-cancel" class="button button--ghost" hidden>Cancelar edição</button>
        </div>
        <p id="form-feedback" class="form-feedback" aria-live="polite"></p>
      </form>
    </article>
  </section>

  <section id="json-overlay" class="overlay-shell" hidden aria-hidden="true">
    <article class="overlay-panel" role="dialog" aria-modal="true" aria-labelledby="json-title">
      <div class="section-head section-head--overlay">
        <h2 id="json-title">JSON</h2>
        <button type="button" class="icon-button overlay-close-button" data-close-overlay="json" aria-label="Fechar JSON" title="Fechar">
          <svg viewBox="0 0 24 24" focusable="false" aria-hidden="true">
            <path d="M6 6l12 12M18 6L6 18"/>
          </svg>
        </button>
      </div>

      <form id="json-form" class="json-form">
        <label class="field field--icon">
          <span class="field__label sr-only">Escopo do JSON</span>
          <span class="field__icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" focusable="false">
              <path d="M9 5c-2 0-3 1-3 3v2c0 1-.4 1.7-1.2 2 .8.3 1.2 1 1.2 2v2c0 2 1 3 3 3"/>
              <path d="M15 5c2 0 3 1 3 3v2c0 1 .4 1.7 1.2 2-.8.3-1.2 1-1.2 2v2c0 2-1 3-3 3"/>
            </svg>
          </span>
          <select id="json-scope" aria-label="Escopo do JSON">
            <option value="all">Tudo</option>
            <option value="projects">Projetos</option>
            <option value="members">Responsáveis</option>
          </select>
        </label>

        <label class="field field--icon">
          <span class="field__label sr-only">Conteúdo JSON</span>
          <span class="field__icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" focusable="false">
              <path d="M6 7h12M6 12h12M6 17h8"/>
            </svg>
          </span>
          <textarea id="json-textarea" rows="14" spellcheck="false" aria-label="Conteúdo JSON" placeholder='{"resp":["Fabio Ara"],"proj":[]}'></textarea>
        </label>

        <p class="json-form__hint">Baixar gera um arquivo <code>.json</code>. Subir aplica o conteúdo colado no campo.</p>

        <div class="json-form__actions">
          <button type="button" id="json-download-button" class="button button--secondary button--icon" aria-label="Baixar JSON" title="Baixar JSON">
            <svg viewBox="0 0 24 24" focusable="false" aria-hidden="true">
              <path d="M12 4v11"/>
              <path d="M8 11l4 4 4-4"/>
              <path d="M5 19h14"/>
            </svg>
            <span>Baixar</span>
          </button>
          <button type="button" id="json-copy-button" class="button button--secondary button--icon" aria-label="Copiar JSON" title="Copiar JSON">
            <svg viewBox="0 0 24 24" focusable="false" aria-hidden="true">
              <rect x="9" y="9" width="10" height="10" rx="2"/>
              <path d="M7 15H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h7a2 2 0 0 1 2 2v1"/>
            </svg>
            <span>Copiar</span>
          </button>
          <button type="button" id="json-upload-button" class="button button--icon" aria-label="Subir JSON" title="Subir JSON">
            <svg viewBox="0 0 24 24" focusable="false" aria-hidden="true">
              <path d="M12 20V9"/>
              <path d="M8 13l4-4 4 4"/>
              <path d="M5 5h14"/>
            </svg>
            <span>Subir</span>
          </button>
        </div>
        <p id="json-feedback" class="form-feedback" aria-live="polite"></p>
      </form>
    </article>
  </section>

  <template id="project-card-template">
    <article class="project-card">
      <div class="project-card__header">
        <div>
          <h3 class="project-card__title"></h3>
          <p class="project-card__description"></p>
        </div>
        <div class="project-card__actions">
          <span class="project-card__status"></span>
          <button type="button" class="icon-button project-edit-button" aria-label="Editar projeto">
            <svg viewBox="0 0 24 24" focusable="false" aria-hidden="true">
              <path d="M4 20h4l10-10-4-4L4 16z"/>
              <path d="M13 7l4 4"/>
            </svg>
          </button>
          <button type="button" class="icon-button project-delete-button" aria-label="Excluir projeto">
            <svg viewBox="0 0 24 24" focusable="false" aria-hidden="true">
              <path d="M4 7h16"/>
              <path d="M10 11v6M14 11v6"/>
              <path d="M9 4h6l1 3H8z"/>
              <path d="M6 7l1 12h10l1-12"/>
            </svg>
          </button>
        </div>
      </div>

      <div class="project-card__meta">
        <span class="project-tag project-deadline-tag"></span>
        <span class="project-tag project-progress-tag"></span>
      </div>

      <section class="activities" aria-label="Atividades do projeto">
        <div class="activities__head">
          <h4>Atividades</h4>
          <span class="activities__counter"></span>
        </div>

        <form class="activity-form">
          <input type="hidden" name="projectId">
          <div class="activity-form__grid">
            <label class="field field--compact field--icon">
              <span class="field__label sr-only">Título da atividade</span>
              <span class="field__icon" aria-hidden="true">
                <svg viewBox="0 0 24 24" focusable="false">
                  <path d="M6 7h12M6 12h12M6 17h8"/>
                </svg>
              </span>
              <input type="text" name="title" maxlength="80" placeholder="Revisar backlog" aria-label="Título da atividade" required>
            </label>

            <label class="field field--compact field--icon">
              <span class="field__label sr-only">Responsável pela atividade</span>
              <span class="field__icon" aria-hidden="true">
                <svg viewBox="0 0 24 24" focusable="false">
                  <circle cx="12" cy="8" r="3.5"/>
                  <path d="M5 19a7 7 0 0 1 14 0"/>
                </svg>
              </span>
              <select name="responsible" class="activity-responsible-select" aria-label="Responsável pela atividade" required></select>
            </label>
          </div>

          <div class="activity-form__actions">
            <button type="submit" class="button button--secondary button--icon" aria-label="Adicionar atividade" title="Adicionar atividade">
              <svg viewBox="0 0 24 24" focusable="false" aria-hidden="true">
                <path d="M12 5v14M5 12h14"/>
              </svg>
            </button>
          </div>
        </form>

        <div class="activities-empty-state" hidden>Nenhuma atividade ainda.</div>
        <ul class="activity-list"></ul>
      </section>
    </article>
  </template>

  <script src="./script.js"></script>
</body>
</html>
