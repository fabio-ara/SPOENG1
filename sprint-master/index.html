<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sprint Master</title>
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <main class="app">
    <header class="masthead">
      <div class="masthead__top">
        <img class="masthead__logo" src="./assets/ifsp-logo.png" alt="Logotipo do IFSP">
        <h1>Sprint Master</h1>
      </div>
    </header>

    <section class="strip" aria-labelledby="dashboard-title">
      <h2 id="dashboard-title" class="sr-only">Resumo</h2>
      <ul class="stats" aria-label="Resumo dos projetos">
        <li class="stat">
          <span class="stat__icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" focusable="false">
              <path d="M4 5.5A1.5 1.5 0 0 1 5.5 4h6.879a2 2 0 0 1 1.414.586l4.621 4.621A2 2 0 0 1 19 10.621V18.5A1.5 1.5 0 0 1 17.5 20h-12A1.5 1.5 0 0 1 4 18.5z"/>
              <path d="M13 4.5V9a1 1 0 0 0 1 1h4.5"/>
            </svg>
          </span>
          <strong id="total-projects">0</strong>
        </li>
        <li class="stat">
          <span class="stat__icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" focusable="false">
              <path d="M5 6.5A1.5 1.5 0 0 1 6.5 5h11A1.5 1.5 0 0 1 19 6.5v11a1.5 1.5 0 0 1-1.5 1.5h-11A1.5 1.5 0 0 1 5 17.5z"/>
              <path d="M8 9h8M8 12h8M8 15h5"/>
            </svg>
          </span>
          <strong id="total-activities">0</strong>
        </li>
        <li class="stat">
          <span class="stat__icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" focusable="false">
              <rect x="4" y="5" width="16" height="15" rx="2"/>
              <path d="M8 3v4M16 3v4M4 10h16"/>
            </svg>
          </span>
          <strong id="completed-activities">0</strong>
        </li>
        <li class="stat stat--wide">
          <span class="stat__icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" focusable="false">
              <path d="M12 4a8 8 0 1 1-8 8"/>
              <path d="M12 4v8h8"/>
            </svg>
          </span>
          <strong id="overall-progress">0%</strong>
        </li>
      </ul>
    </section>

    <section class="panel panel--form" aria-labelledby="project-form-title">
      <div class="section-head">
        <h2 id="project-form-title">Novo projeto</h2>
        <span class="section-head__icon" aria-hidden="true">
          <svg viewBox="0 0 24 24" focusable="false">
            <path d="M12 5v14M5 12h14"/>
          </svg>
        </span>
      </div>

      <form id="project-form" class="project-form">
        <label class="field field--icon">
          <span class="field__label sr-only">Nome do projeto</span>
          <span class="field__icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" focusable="false">
              <path d="M4 5.5A1.5 1.5 0 0 1 5.5 4h6.879a2 2 0 0 1 1.414.586l4.621 4.621A2 2 0 0 1 19 10.621V18.5A1.5 1.5 0 0 1 17.5 20h-12A1.5 1.5 0 0 1 4 18.5z"/>
              <path d="M13 4.5V9a1 1 0 0 0 1 1h4.5"/>
            </svg>
          </span>
          <input type="text" name="name" maxlength="80" placeholder="Plataforma de Iniciação Científica" aria-label="Nome do projeto" required>
        </label>

        <label class="field field--icon">
          <span class="field__label sr-only">Descrição do projeto</span>
          <span class="field__icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" focusable="false">
              <path d="M6 7h12M6 12h12M6 17h8"/>
            </svg>
          </span>
          <textarea name="description" rows="3" maxlength="240" placeholder="Descrição do projeto." aria-label="Descrição do projeto"></textarea>
        </label>

        <label class="field field--icon">
          <span class="field__label sr-only">Prazo do projeto</span>
          <span class="field__icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" focusable="false">
              <rect x="4" y="5" width="16" height="15" rx="2"/>
              <path d="M8 3v4M16 3v4M4 10h16"/>
            </svg>
          </span>
          <input type="date" name="deadline" aria-label="Prazo do projeto">
        </label>

        <button type="submit" class="button button--icon" aria-label="Salvar projeto" title="Salvar projeto">
          <svg viewBox="0 0 24 24" focusable="false" aria-hidden="true">
            <path d="M12 5v14M5 12h14"/>
          </svg>
        </button>
        <p id="form-feedback" class="form-feedback" aria-live="polite"></p>
      </form>
    </section>

    <section class="panel" aria-labelledby="projects-title">
      <div class="section-head">
        <h2 id="projects-title">Projetos</h2>
        <span class="section-head__icon" aria-hidden="true">
          <svg viewBox="0 0 24 24" focusable="false">
            <path d="M6 7h12M6 12h12M6 17h12"/>
          </svg>
        </span>
      </div>

      <div id="projects-empty-state" class="empty-state">
        <span class="empty-state__icon" aria-hidden="true">
          <svg viewBox="0 0 24 24" focusable="false">
            <path d="M4 5.5A1.5 1.5 0 0 1 5.5 4h6.879a2 2 0 0 1 1.414.586l4.621 4.621A2 2 0 0 1 19 10.621V18.5A1.5 1.5 0 0 1 17.5 20h-12A1.5 1.5 0 0 1 4 18.5z"/>
            <path d="M13 4.5V9a1 1 0 0 0 1 1h4.5"/>
          </svg>
        </span>
        <p>Nenhum projeto cadastrado.</p>
      </div>

      <div id="projects-list" class="projects-list" aria-live="polite"></div>
    </section>
  </main>

  <template id="project-card-template">
    <article class="project-card">
      <div class="project-card__header">
        <div>
          <h3 class="project-card__title"></h3>
          <p class="project-card__description"></p>
        </div>
        <div class="project-card__actions">
          <span class="project-card__status"></span>
          <button type="button" class="icon-button project-delete-button" aria-label="Excluir projeto">
            <svg viewBox="0 0 24 24" focusable="false" aria-hidden="true">
              <path d="M4 7h16"/>
              <path d="M10 11v6M14 11v6"/>
              <path d="M9 4h6l1 3H8z"/>
              <path d="M6 7l1 12h10l1-12"/>
            </svg>
          </button>
        </div>
      </div>

      <div class="project-card__meta">
        <span class="project-tag project-deadline-tag"></span>
        <span class="project-tag project-progress-tag"></span>
      </div>

      <section class="activities" aria-label="Atividades do projeto">
        <div class="activities__head">
          <h4>Atividades</h4>
          <span class="activities__counter"></span>
        </div>

        <form class="activity-form">
          <input type="hidden" name="projectId">
          <div class="activity-form__grid">
            <label class="field field--compact field--icon">
              <span class="field__label sr-only">Título da atividade</span>
              <span class="field__icon" aria-hidden="true">
                <svg viewBox="0 0 24 24" focusable="false">
                  <path d="M6 7h12M6 12h12M6 17h8"/>
                </svg>
              </span>
              <input type="text" name="title" maxlength="80" placeholder="Revisar backlog" aria-label="Título da atividade" required>
            </label>

            <label class="field field--compact field--icon">
              <span class="field__label sr-only">Responsável pela atividade</span>
              <span class="field__icon" aria-hidden="true">
                <svg viewBox="0 0 24 24" focusable="false">
                  <circle cx="12" cy="8" r="3.5"/>
                  <path d="M5 19a7 7 0 0 1 14 0"/>
                </svg>
              </span>
              <input type="text" name="responsible" maxlength="50" placeholder="Lucas" aria-label="Responsável pela atividade" required>
            </label>
          </div>

          <button type="submit" class="button button--secondary button--icon" aria-label="Adicionar atividade" title="Adicionar atividade">
            <svg viewBox="0 0 24 24" focusable="false" aria-hidden="true">
              <path d="M12 5v14M5 12h14"/>
            </svg>
          </button>
        </form>

        <div class="activities-empty-state" hidden>Nenhuma atividade ainda.</div>
        <ul class="activity-list"></ul>
      </section>
    </article>
  </template>

  <script src="./script.js"></script>
</body>
</html>
